# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: [master]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.149.1'
      - name: Install Golang
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - name: Cache asciidoctor-server
        uses: actions/cache@v5
        with:
          path: ~/.local/bin/asciidoctor-server
          key: asciidoctor-server-v0.4.4
      - name: Install asciidoctor Client
        run: |
          if [ ! -f ~/.local/bin/asciidoctor-server ]; then
            mkdir -p ~/.local/bin
            curl -sL https://github.com/hybras/asciidoctor-server/releases/download/v0.4.4/asciidoctor-server-linux-x64 -o ~/.local/bin/asciidoctor-server
            chmod +x ~/.local/bin/asciidoctor-server
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Setup direnv
        uses: HatsuneMiku3939/direnv-action@v1
      - name: Install Ruby and Ruby Packages
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
        env:
          BUNDLER_WITHOUT: development
      - name: Cache Hugo resources
        uses: actions/cache@v5
        with:
          path: resources
          key: hugo-resources
      - name: Go flags
        run: go env -w GOFLAGS="-mod=readonly"
      - name: Start asciidoctor server
        run: asciidoctor-server &
      - name: Build with Hugo
        env:
          # For maximum backward compatibility with Hugo modules
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
